# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/chatengine}
spring.data.mongodb.database=chatengine

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT
app.jwt.secret=${JWT_SECRET:ThisIsAVerySecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# WebSocket
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.com.chatengine=DEBUG
logging.level.org.springframework.web.socket=INFO
