apiVersion: v1
kind: Namespace
metadata:
  name: chat-engine
  labels:
    app: chat-engine

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-engine-config
  namespace: chat-engine
data:
  MONGODB_URI: "mongodb://mongo-service:27017/chatengine"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  SERVER_PORT: "8080"
