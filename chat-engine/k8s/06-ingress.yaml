apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-engine-ingress
  namespace: chat-engine
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    # WebSocket support — critical for STOMP/SockJS
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "chat-engine-service"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
    # SSL/TLS — update with your cert
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - chat.yourdomain.com
      secretName: chat-engine-tls
  rules:
    - host: chat.yourdomain.com
      http:
        paths:
          # Frontend (catch-all SPA) — must come last so /api and /ws match first
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-frontend-service
                port:
                  number: 80
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chat-engine-service
                port:
                  number: 80
          # WebSocket routes (SockJS)
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: chat-engine-service
                port:
                  number: 80
          # Health / metrics
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: chat-engine-service
                port:
                  number: 80
