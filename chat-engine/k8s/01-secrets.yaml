apiVersion: v1
kind: Secret
metadata:
  name: chat-engine-secrets
  namespace: chat-engine
type: Opaque
stringData:
  # Replace these with strong secrets in production
  # Use: kubectl create secret generic chat-engine-secrets \
  #        --from-literal=JWT_SECRET="your-256-bit-secret" \
  #        --from-literal=REDIS_PASSWORD="your-redis-password"
  JWT_SECRET: "REPLACE_ME_BEFORE_DEPLOYMENT"
  REDIS_PASSWORD: ""
