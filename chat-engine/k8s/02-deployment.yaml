apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-engine
  namespace: chat-engine
  labels:
    app: chat-engine
    version: "1.0.0"
spec:
  replicas: 3  # Start with 3; HPA will scale up/down
  selector:
    matchLabels:
      app: chat-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: chat-engine
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      # Spread pods across nodes for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: chat-engine

      containers:
        - name: chat-engine
          image: your-registry/chat-engine:latest  # Update with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http

          envFrom:
            - configMapRef:
                name: chat-engine-config

          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-engine-secrets
                  key: JWT_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chat-engine-secrets
                  key: REDIS_PASSWORD

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          # Liveness: kill and restart if hung
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3

          # Readiness: don't route traffic until ready
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          # Graceful shutdown: drain WebSocket connections
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: chat-engine-service
  namespace: chat-engine
  labels:
    app: chat-engine
spec:
  selector:
    app: chat-engine
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
