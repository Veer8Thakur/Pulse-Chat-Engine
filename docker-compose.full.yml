version: '3.9'

services:

  # ─────────────────────────────────────────────────────────────
  # Frontend (React + Vite dev server)
  # ─────────────────────────────────────────────────────────────
  chat-frontend-dev:
    build:
      context: ./chat-frontend
      dockerfile: Dockerfile.dev
    container_name: chat-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./chat-frontend/src:/app/src
      - ./chat-frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - chat-engine
    restart: unless-stopped
    networks:
      - chat-net

  # ─────────────────────────────────────────────────────────────
  # Backend (Spring Boot)
  # ─────────────────────────────────────────────────────────────
  chat-engine:
    build:
      context: ./chat-engine
      dockerfile: Dockerfile
    container_name: chat-engine-app
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/chatengine
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: LocalDevSecretThatIsAtLeast256BitsLongForHS256Algorithm
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chat-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./chat-engine/docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - chat-net

  # ─────────────────────────────────────────────────────────────
  # Redis (pub/sub broker)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - chat-net

  # ─────────────────────────────────────────────────────────────
  # MongoDB Admin UI
  # ─────────────────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: chat-mongo-ui
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - chat-net

  # ─────────────────────────────────────────────────────────────
  # Redis Admin UI
  # ─────────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: chat-redis-ui
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - chat-net

volumes:
  mongo-data:
  redis-data:

networks:
  chat-net:
    driver: bridge
